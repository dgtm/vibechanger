<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video AI Recorder</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 24px; max-width: 720px; }
      video { width: 100%; background: #111; border-radius: 8px; }
      .row { display: flex; gap: 12px; margin: 12px 0; flex-wrap: wrap; }
      button { padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; }
      input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; }
      #status { white-space: pre-wrap; font-family: ui-monospace, Menlo, monospace; background: #f7f7f7; padding: 12px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>Record and Run 3-Step Video Jobs</h1>
    <video id="preview" autoplay playsinline muted></video>
    <div class="row">
      <button id="start">Start Recording</button>
      <button id="stop" disabled>Stop Recording</button>
      <button id="uploadOnly" disabled>Upload Video</button>
      <button id="runStep1" disabled>Run Step 1 (Text Transform)</button>
      <button id="runStep2" disabled>Run Step 2 (CosyVoice3)</button>
      <button id="runStep3" disabled>Run Step 3 (MuseTalk)</button>
    </div>
    <label>Style</label>
    <input id="style" value="confident" />
    <label>Optional source text override</label>
    <input id="sourceText" placeholder="Leave empty to use transcript" />
    <h3>Generated Video</h3>
    <video id="resultVideo" controls playsinline></video>
    <h3>Recent Outputs</h3>
    <div id="recentOutputs">Loading...</div>
    <div id="status">Idle</div>

    <script>
      const preview = document.getElementById("preview");
      const startBtn = document.getElementById("start");
      const stopBtn = document.getElementById("stop");
      const uploadOnlyBtn = document.getElementById("uploadOnly");
      const runStep1Btn = document.getElementById("runStep1");
      const runStep2Btn = document.getElementById("runStep2");
      const runStep3Btn = document.getElementById("runStep3");
      const statusEl = document.getElementById("status");
      const styleEl = document.getElementById("style");
      const sourceTextEl = document.getElementById("sourceText");
      const resultVideoEl = document.getElementById("resultVideo");
      const recentOutputsEl = document.getElementById("recentOutputs");

      let mediaRecorder;
      let chunks = [];
      let videoBlob = null;
      let recordMimeType = "";
      let uploadedObjectPath = "";

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      async function mustJson(res, label) {
        let payload = {};
        try { payload = await res.json(); } catch (_) {}
        if (!res.ok) {
          const detail = payload.detail || JSON.stringify(payload) || `${res.status} ${res.statusText}`;
          throw new Error(`${label} failed: ${detail}`);
        }
        return payload;
      }

      function renderRecentOutputs(items) {
        if (!items || items.length === 0) {
          recentOutputsEl.textContent = "No outputs yet.";
          return;
        }
        recentOutputsEl.innerHTML = items
          .map((item) => {
            const outName = item.object_path.split("/").pop();
            const inName = item.input_object_path ? item.input_object_path.split("/").pop() : "unknown";
            const updated = item.updated ? new Date(item.updated).toLocaleString() : "";
            return `<div style="margin:8px 0;">
              ${item.input_video_url ? `<button data-url="${item.input_video_url.replace(/"/g, "&quot;")}">Play Input</button>` : `<button disabled>Play Input</button>`}
              <button data-url="${item.video_url.replace(/"/g, "&quot;")}">Play Output</button>
              <span style="margin-left:8px;">${inName} -> ${outName}</span>
              <span style="margin-left:8px;color:#666;">${updated}</span>
            </div>`;
          })
          .join("");
        recentOutputsEl.querySelectorAll("button[data-url]").forEach((btn) => {
          btn.onclick = () => {
            resultVideoEl.src = btn.getAttribute("data-url");
            resultVideoEl.load();
          };
        });
      }

      async function loadRecentOutputs() {
        try {
          const res = await fetch("/api/output-videos?limit=5");
          const data = await mustJson(res, "output-videos");
          renderRecentOutputs(data.items || []);
        } catch (err) {
          recentOutputsEl.textContent = `Failed to load outputs: ${err}`;
        }
      }

      async function initCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        preview.srcObject = stream;
      }

      function pickMimeType() {
        const candidates = [
          "video/webm;codecs=vp8,opus",
          "video/webm",
          "video/mp4;codecs=h264,aac",
          "video/mp4"
        ];
        for (const mime of candidates) {
          if (window.MediaRecorder && MediaRecorder.isTypeSupported(mime)) return mime;
        }
        return "";
      }

      startBtn.onclick = async () => {
        const stream = preview.srcObject;
        if (!stream) {
          setStatus("No camera stream. Check browser camera/mic permissions.");
          return;
        }
        chunks = [];
        recordMimeType = pickMimeType();
        if (!window.MediaRecorder) {
          setStatus("MediaRecorder is not available in this browser.");
          return;
        }
        if (!recordMimeType) {
          setStatus("No supported recording format found in this browser.");
          return;
        }
        mediaRecorder = new MediaRecorder(stream, { mimeType: recordMimeType });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
          videoBlob = new Blob(chunks, { type: recordMimeType });
          uploadOnlyBtn.disabled = false;
          setStatus(`Recorded ${(videoBlob.size / (1024 * 1024)).toFixed(2)} MB (${recordMimeType})`);
        };
        mediaRecorder.onerror = (e) => setStatus(`Recorder error: ${e.error?.message || e}`);
        mediaRecorder.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus(`Recording... (${recordMimeType})`);
      };

      stopBtn.onclick = () => {
        mediaRecorder.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
      };

      async function pollStatus(executionName, label) {
        setStatus(`${label}\nExecution: ${executionName}\nPolling status...`);
        const timer = setInterval(async () => {
          const stRes = await fetch(`/api/status/${executionName}`);
          const st = await mustJson(stRes, "status");
          setStatus(
            `${label}\nExecution: ${executionName}\nComplete: ${st.complete}\nSuccess: ${st.success}`
          );
          if (st.complete) {
            clearInterval(timer);
            if (label.includes("Step 3") && st.success && uploadedObjectPath) {
              try {
                setStatus(`${label}\nExecution: ${executionName}\nFetching output video URL...`);
                const outRes = await fetch(`/api/output-video?object_path=${encodeURIComponent(uploadedObjectPath)}`);
                const out = await mustJson(outRes, "output-video");
                resultVideoEl.src = out.video_url;
                resultVideoEl.load();
                await loadRecentOutputs();
                setStatus(`${label}\nExecution: ${executionName}\nSuccess: true\nOutput: ${out.object_path}`);
              } catch (err) {
                setStatus(`${label}\nExecution: ${executionName}\nSuccess: true\nOutput fetch error: ${err}`);
              }
            }
          }
        }, 5000);
      }

      uploadOnlyBtn.onclick = async () => {
        if (!videoBlob) return;
        try {
          setStatus("Creating signed URL...");
          const signRes = await fetch("/api/sign-upload", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content_type: videoBlob.type || "video/webm" })
          });
          const sign = await mustJson(signRes, "sign-upload");

          setStatus("Uploading video to GCS...");
          const upRes = await fetch(sign.upload_url, {
            method: "PUT",
            headers: { "Content-Type": videoBlob.type || sign.content_type },
            body: videoBlob,
          });
          if (!upRes.ok) {
            throw new Error(`upload failed: ${upRes.status} ${upRes.statusText}`);
          }
          uploadedObjectPath = sign.object_path;
          runStep1Btn.disabled = false;
          runStep2Btn.disabled = false;
          runStep3Btn.disabled = false;
          setStatus(`Uploaded: ${uploadedObjectPath}`);
        } catch (err) {
          setStatus(`Error: ${err}`);
        }
      };

      runStep1Btn.onclick = async () => {
        if (!uploadedObjectPath) {
          setStatus("Upload video first.");
          return;
        }
        try {
          setStatus("Triggering step 1 (Text Transform)...");
          const runRes = await fetch("/api/run-step1", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              object_path: uploadedObjectPath,
              text_style: styleEl.value || "confident",
              source_text: sourceTextEl.value || "",
            }),
          });
          const run = await mustJson(runRes, "run-step1");
          await pollStatus(run.execution_name, "Step 1 (Text Transform)");
        } catch (err) {
          setStatus(`Error: ${err}`);
        }
      };

      runStep2Btn.onclick = async () => {
        if (!uploadedObjectPath) {
          setStatus("Upload video first.");
          return;
        }
        try {
          setStatus("Triggering step 2 (CosyVoice3)...");
          const runRes = await fetch("/api/run-step2", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              object_path: uploadedObjectPath,
              text_style: styleEl.value || "confident",
              source_text: sourceTextEl.value || "",
            }),
          });
          const run = await mustJson(runRes, "run-step2");
          await pollStatus(run.execution_name, "Step 2 (CosyVoice3)");
        } catch (err) {
          setStatus(`Error: ${err}`);
        }
      };

      runStep3Btn.onclick = async () => {
        if (!uploadedObjectPath) {
          setStatus("Upload video first.");
          return;
        }
        try {
          setStatus("Triggering step 3 (MuseTalk)...");
          const runRes = await fetch("/api/run-step3", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              object_path: uploadedObjectPath,
              text_style: styleEl.value || "confident",
              source_text: sourceTextEl.value || "",
            }),
          });
          const run = await mustJson(runRes, "run-step3");
          await pollStatus(run.execution_name, "Step 3 (MuseTalk)");
        } catch (err) {
          setStatus(`Error: ${err}`);
        }
      };

      loadRecentOutputs();
      initCamera().catch((err) => setStatus(`Camera error: ${err}`));
    </script>
  </body>
  </html>
